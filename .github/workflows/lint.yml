name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install ruff only (not the full project) so the lint job stays fast.
      # The pinned version keeps CI reproducible; bump it alongside the version
      # range in pyproject.toml's dev dependencies.
      - name: Install ruff
        run: pip install "ruff>=0.6,<1.0"

      - name: Run ruff
        run: ruff check src/ tests/

  frontend:
    name: Frontend (oxlint + tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npx tsc -b
