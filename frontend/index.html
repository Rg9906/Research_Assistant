<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PaperPilot AI</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Manrope:wght@600;700;800&family=Space+Grotesk:wght@300;400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- Apply the saved light/dark preference before first paint so a returning
         user in dark mode never sees a flash of the light theme (the app can
         mount directly, without the splash, on a mid-session reload). The
         ThemeProvider is the source of truth once React mounts. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('pp_theme') === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-background text-on-surface font-body-ui selection:bg-primary-container selection:text-on-primary-container">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
